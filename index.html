{id:"e_chawanmushi",cat:"eat",reg:"either",area:"jp",lvl:1,name:"Chawanmushi",note:"Silky savory egg custard hiding shrimp and ginkgo — a warm, wobbly Japanese comfort dish.",tip:"Served in a lidded cup; order at any izakaya.",flag:""},
{id:"e_wagashi",cat:"eat",reg:"either",area:"jp",lvl:2,name:"Seasonal wagashi",note:"Edible-art sweets shaped to the exact season and built to offset matcha's bitterness.",tip:"July motifs are water and morning glory; browse a depachika.",flag:""},
{id:"e_omurice",cat:"eat",reg:"tokyo",area:"ginza",lvl:1,name:"Omurice",note:"Ketchup fried rice under a tender omelette — Japan's home-grown 'yoshoku' comfort food born in Tokyo kitchens.",tip:"A retro kissaten coffee house is the authentic place to order it.",flag:""},
{id:"e_gyukatsu",cat:"eat",reg:"tokyo",area:"shibuya",lvl:2,name:"Gyukatsu",note:"Panko-crusted rare beef you finish searing yourself on a personal hot stone.",tip:"Sear 5 seconds a side; dip in wasabi-soy.",flag:""},
{id:"e_unagi",cat:"eat",reg:"tokyo",area:"asakusa",lvl:2,name:"Unagi over rice",note:"Charcoal-grilled freshwater eel lacquered in sweet tare — a midsummer stamina dish with centuries of ritual.",tip:"The 'Day of the Ox' is Jul 19 — eel shops get slammed.",flag:"Summer"},
{id:"e_monja",cat:"eat",reg:"tokyo",area:"tsukishima",lvl:2,name:"Monjayaki",note:"Tokyo's gooey griddle-pancake you cook yourself — born on Tsukishima's Monja Street and rarely seen elsewhere.",tip:"Scrape it off the teppan with tiny spatulas.",flag:""},
{id:"e_standingsushi",cat:"eat",reg:"tokyo",area:"akihabara",lvl:1,name:"Standing sushi bar",note:"Premium nigiri eaten shoulder-to-shoulder with no chairs — a fast, cheap Tokyo ritual.",tip:"Point and eat piece by piece; cheaper than it tastes.",flag:""},
{id:"e_depachika",cat:"eat",reg:"tokyo",area:"shinjuku",lvl:1,name:"Depachika hall",note:"A department-store basement that's a glittering food universe of bento, sweets and samples.",tip:"Go an hour before closing for marked-down gourmet bento.",flag:""},
{id:"e_fugu",cat:"eat",reg:"either",area:"jp",lvl:3,name:"Fugu (pufferfish)",note:"The thrill dish — toxic unless trimmed by a licensed chef, so it's served legally almost only in Japan.",tip:"Try the set: sashimi, karaage, then hot-pot.",flag:""},
{id:"e_han",cat:"eat",reg:"tokyo",area:"shibuya",lvl:2,name:"Wagyu yakiniku",note:"Grill your own A5 wagyu at the table — startling value at Han no Daidokoro in Shibuya.",tip:"Book for 4; lunch sets are far cheaper than dinner.",flag:"Book"},
{id:"e_omoide",cat:"eat",reg:"tokyo",area:"shinjuku",lvl:2,name:"Omoide Yokocho",note:"A smoky postwar alley of six-seat charcoal yakitori counters frozen in time.",tip:"Cash only; split the four of you across two counters.",flag:"Cash"},
{id:"e_toyosu",cat:"eat",reg:"tokyo",area:"toyosu",lvl:2,name:"Toyosu market sushi",note:"Counter omakase inside the world's biggest fish market, eaten at 7am.",tip:"Arrive ~6:30 or pick a quieter counter than Sushi Dai.",flag:""},
{id:"e_afuri",cat:"eat",reg:"tokyo",area:"harajuku",lvl:1,name:"Yuzu ramen",note:"Light, citrus-bright chicken broth lifted with yuzu peel — the summer anti-tonkotsu.",tip:"Order from the door machine; ask for cold tsukemen in heat.",flag:""},
{id:"e_omakase",cat:"eat",reg:"tokyo",area:"ginza",lvl:3,name:"Ginza sushi omakase",note:"A counter where the chef sets the pace and the fish is aged to the day.",tip:"Top counters book weeks out — reserve before you fly.",flag:"Book"},
{id:"e_teppan",cat:"eat",reg:"tokyo",area:"ginza",lvl:3,name:"Wagyu teppanyaki",note:"A chef searing the highest-grade beef inches from your plate as theatre.",tip:"Sit at the counter, not a table, for the knife-work.",flag:""},
{id:"e_misoramen",cat:"eat",reg:"hokkaido",area:"susukino",lvl:1,name:"Sapporo miso ramen",note:"Buttery miso-and-corn ramen — the style was literally invented in this city.",tip:"Ramen Alley packs ~17 tiny shops into one Susukino lane.",flag:"Only Hokkaido"},
{id:"e_soupcurry",cat:"eat",reg:"hokkaido",area:"sapporo",lvl:2,name:"Soup curry",note:"A 1970s Sapporo invention: spiced thin broth over a whole roast chicken leg and chunky veg.",tip:"Pick spice level and rice size. Garaku is the legend — queue early.",flag:"Only Hokkaido"},
{id:"e_jingisukan",cat:"eat",reg:"hokkaido",area:"susukino",lvl:2,name:"Jingisukan",note:"Lamb grilled on a domed skillet — a Hokkaido specialty rare elsewhere in Japan.",tip:"Order extra onions in the fat moat. Daruma is the smoky institution.",flag:"Only Hokkaido"},
{id:"e_uni",cat:"eat",reg:"hokkaido",area:"shakotan",lvl:3,name:"Summer uni",note:"Kelp-fed sea urchin at its sweet seasonal peak off the Shakotan coast, June–August only.",tip:"July is prime; eat it as a fresh bowl, no soy.",flag:"Summer"},
{id:"e_corn",cat:"eat",reg:"hokkaido",area:"furano",lvl:1,name:"Grilled Hokkaido corn",note:"Sugar-sweet sweetcorn charred and buttered at roadside stands — a July harvest treat.",tip:"Best ears are around Furano and Biei.",flag:"Summer"},
{id:"e_kaisendon",cat:"eat",reg:"hokkaido",area:"sapporo",lvl:2,name:"Kaisen-don",note:"A rice bowl buried under uni, ikura, crab and squid pulled from three cold seas.",tip:"Nijo Market (Sapporo) does the classic for breakfast.",flag:""},
{id:"e_ikasashimi",cat:"eat",reg:"hokkaido",area:"hakodate",lvl:1,name:"Live squid sashimi",note:"Just-caught squid, sometimes still moving, sliced at a northern morning market.",tip:"Squid season is Jul–Sep. Go 6–9am.",flag:"Summer"},
{id:"e_crab",cat:"eat",reg:"hokkaido",area:"sapporo",lvl:3,name:"Hokkaido crab",note:"King, snow and creamy horsehair crab — the north's signature luxury haul.",tip:"Horsehair (kegani) is the pick; the kani-miso is the prize.",flag:""},
{id:"e_zangi",cat:"eat",reg:"hokkaido",area:"sapporo",lvl:1,name:"Zangi",note:"Hokkaido's juicier, deeply-marinated cousin of karaage fried chicken.",tip:"An izakaya staple up north — order with a Sapporo Classic.",flag:"Only Hokkaido"},
{id:"e_hakodateramen",cat:"eat",reg:"hokkaido",area:"hakodate",lvl:1,name:"Shio ramen",note:"A clear, delicate salt broth — Hakodate's gentle answer to Sapporo miso.",tip:"Ajisai is the 90-year-old benchmark shop.",flag:""},
{id:"e_letao",cat:"eat",reg:"hokkaido",area:"otaru",lvl:1,name:"LeTAO cheesecake",note:"Otaru's melt-in-mouth double-fromage — far better eaten fresh on-site than shipped.",tip:"The main-store tower gives free tastings of exclusives.",flag:""},
{id:"e_yubari",cat:"eat",reg:"hokkaido",area:"sapporo",lvl:3,name:"Yubari melon",note:"The world's priciest melon — orange-fleshed, perfumed and gone by late summer.",tip:"Try a wedge with soft serve, not a ¥10,000 whole one.",flag:"Summer"},
{id:"e_softcream",cat:"eat",reg:"hokkaido",area:"furano",lvl:1,name:"Hokkaido soft cream",note:"The country's richest dairy churned into lavender and melon swirls in summer.",tip:"Otaru even does squid-ink and kombu if you're brave.",flag:""},
{id:"e_kaiseki",cat:"eat",reg:"hokkaido",area:"jozankei",lvl:3,name:"Ryokan kaiseki",note:"A seasonal multi-course dinner served in your tatami room as the heart of a ryokan stay.",tip:"Half-board is standard — wear the provided yukata to dinner.",flag:""},
/* DO */
{id:"d_konbini",cat:"do",reg:"either",area:"jp",lvl:1,name:"Konbini deep-dive",note:"The 3am wonderland — hot fried chicken, fresh socks, concert tickets and ATMs under one roof.",tip:"Famichiki and Lawson karaage-kun are required tasting.",flag:"Free"},
{id:"d_vending",cat:"do",reg:"either",area:"jp",lvl:1,name:"Vending-machine hunt",note:"Four million machines dispensing hot ramen in a can, oden, dashi and even fresh eggs.",tip:"Haneda T2 has one that cooks a real ramen bowl for you.",flag:""},
{id:"d_toilet",cat:"do",reg:"either",area:"jp",lvl:1,name:"Master the washlet",note:"Heated seats, bidets and sound-masking — the gloriously over-engineered Japanese toilet.",tip:"The 'Otohime' button plays a sound to cover, well, sounds.",flag:"Free"},
{id:"d_karaoke",cat:"do",reg:"either",area:"jp",lvl:1,name:"Karaoke box",note:"Your own private soundproof room — not a public bar stage like the West.",tip:"~¥2,500 buys two hours with all-you-can-drink. Great for 4.",flag:""},
{id:"d_izakaya",cat:"do",reg:"either",area:"jp",lvl:1,name:"Izakaya night",note:"Japan's tapas-and-beer pubs where you order in waves and stay for hours.",tip:"You'll get a small otoshi seat-dish you didn't order — normal.",flag:""},
{id:"d_capsule",cat:"do",reg:"either",area:"jp",lvl:1,name:"Capsule hotel",note:"A snug high-tech sleeping pod — peak Japanese space efficiency, once in a lifetime.",tip:"Grab a window-end pod for a sliver more room.",flag:""},
{id:"d_pachinko",cat:"do",reg:"either",area:"jp",lvl:1,name:"Pachinko parlor",note:"A deafening wall of chrome and silver balls — gambling's uniquely Japanese cousin.",tip:"Five minutes inside is worth it just for the sensory overload.",flag:"Free"},
{id:"d_ekiben",cat:"do",reg:"either",area:"jp",lvl:1,name:"Ekiben on the train",note:"A regional station bento eaten at speed — a beloved rite of Japanese rail travel.",tip:"Buy on the platform before your shinkansen; each region differs.",flag:""},
{id:"d_onsen",cat:"do",reg:"either",area:"jp",lvl:1,name:"Public bath / onsen",note:"The communal hot-spring soak that sits at the quiet heart of Japanese life.",tip:"Wash fully first; towel on your head, never in the water.",flag:""},
{id:"d_manhole",cat:"do",reg:"either",area:"jp",lvl:1,name:"Manhole-cover hunt",note:"Ornate, colorful civic art cast into the drain lids of nearly every town — a real collector craze.",tip:"Some towns sell coaster replicas of theirs.",flag:"Free"},
{id:"d_sensoji",cat:"do",reg:"tokyo",area:"asakusa",lvl:1,name:"Senso-ji & Nakamise",note:"Tokyo's oldest temple behind a 250m lane of traditional snack and souvenir stalls.",tip:"Dawn or after dark = the giant lantern with no crowds.",flag:"Free"},
{id:"d_shibuya",cat:"do",reg:"tokyo",area:"shibuya",lvl:1,name:"Shibuya Crossing",note:"Up to 3,000 people crossing at once — the world's most choreographed pedestrian chaos.",tip:"Free view from the 2F Starbucks or Mag's Park rooftop.",flag:"Free"},
{id:"d_shibuyasky",cat:"do",reg:"tokyo",area:"shibuya",lvl:2,name:"Shibuya Sky",note:"An open-air rooftop deck 230m over the scramble, wind and all.",tip:"Book the sunset slot; it sells out on clear evenings.",flag:"Book"},
{id:"d_meiji",cat:"do",reg:"tokyo",area:"harajuku",lvl:1,name:"Meiji Jingu",note:"A vast, entirely man-planted forest shrine hidden right beside Harajuku.",tip:"Weekend mornings you may catch a Shinto wedding.",flag:"Free"},
{id:"d_akihabara",cat:"do",reg:"tokyo",area:"akihabara",lvl:1,name:"Akihabara",note:"A neon canyon dedicated to anime, retro games, arcades and capsule machines.",tip:"Super Potato for retro consoles; go after dark.",flag:"Free"},
{id:"d_purikura",cat:"do",reg:"tokyo",area:"harajuku",lvl:1,name:"Purikura",note:"Photo booths that auto-enlarge your eyes and bury you in stickers — a group-of-4 classic.",tip:"Some arcades gate them to women — check the sign.",flag:""},
{id:"d_gachaponhall",cat:"do",reg:"tokyo",area:"ikebukuro",lvl:1,name:"Gachapon hall",note:"A room of 1,000+ capsule machines, each one weirdly, wonderfully specific.",tip:"Bring a fistful of ¥100 coins; Ikebukuro's is biggest.",flag:""},
{id:"d_maid",cat:"do",reg:"tokyo",area:"akihabara",lvl:1,name:"Maid café",note:"Akihabara's surreal, deeply earnest cute-café performance — pure only-in-Japan kitsch.",tip:"PG and gimmicky — go for the omurice art and spectacle.",flag:""},
{id:"d_sampuru",cat:"do",reg:"tokyo",area:"kappabashi",lvl:2,name:"Make plastic food",note:"Craft your own hyper-real 'sampuru' wax tempura on Kappabashi.",tip:"Book a workshop; you keep the piece you make.",flag:"Book"},
{id:"d_themedcafe",cat:"do",reg:"tokyo",area:"tokyo",lvl:1,name:"Themed café",note:"Cafés themed to Moomins, Pokémon or vintage arcades that simply don't exist at this density elsewhere.",tip:"Reserve the popular ones; many are timed-entry.",flag:""},
{id:"d_nakano",cat:"do",reg:"tokyo",area:"nakano",lvl:1,name:"Nakano Broadway",note:"A retro otaku mall that's the quieter, deeper rival to Akihabara.",tip:"Floors of vintage Mandarake; hunt discontinued figures.",flag:"Free"},
{id:"d_yanaka",cat:"do",reg:"tokyo",area:"yanaka",lvl:1,name:"Yanaka old town",note:"Low wooden pre-war streets and cat motifs — Tokyo as it was before the towers.",tip:"Walk Yanaka Ginza at dusk for cheap street snacks.",flag:"Free"},
{id:"d_teamplanets",cat:"do",reg:"tokyo",area:"toyosu",lvl:2,name:"teamLab Planets",note:"Wade barefoot through knee-deep water under projected koi and orchids.",tip:"The Toyosu water one (not Borderless). Book ahead; bring shorts.",flag:"Book"},
{id:"d_teamborderless",cat:"do",reg:"tokyo",area:"azabudai",lvl:2,name:"teamLab Borderless",note:"A mapless maze of digital art that flows room to room and spills onto you.",tip:"The NEW one at Azabudai Hills, not Odaiba. Timed tickets.",flag:"Book"},
{id:"d_ghibli",cat:"do",reg:"tokyo",area:"mitaka",lvl:2,name:"Ghibli Museum",note:"Miyazaki's whimsical, no-photos museum with an exclusive short film you can't see elsewhere.",tip:"Advance tickets ONLY and they sell out instantly — plan first.",flag:"Book"},
{id:"d_baseball",cat:"do",reg:"tokyo",area:"tokyo",lvl:2,name:"Pro baseball game",note:"Per-batter chant songs and a 7th-inning balloon launch — far louder than MLB.",tip:"July is mid-season; check the Giants' Tokyo Dome dates.",flag:""},
{id:"d_sumo",cat:"do",reg:"tokyo",area:"ryogoku",lvl:2,name:"Sumo morning practice",note:"Watch giants drill at dawn inside a working Ryogoku stable.",tip:"No Tokyo tournament in July — a stable visit is the way. Book.",flag:"Book"},
{id:"d_kintsugi",cat:"do",reg:"tokyo",area:"tokyo",lvl:3,name:"Kintsugi workshop",note:"Mend broken pottery with gold — the Japanese art of honoring a scar.",tip:"Beginner classes finish a real piece you take home.",flag:"Book"},
{id:"d_tea",cat:"do",reg:"tokyo",area:"ginza",lvl:2,name:"Tea ceremony",note:"A slow, exacting bowl of matcha whisked in a garden tea house.",tip:"Happo-en and Hamarikyu run English-friendly sittings.",flag:"Book"},
{id:"d_hakodateview",cat:"do",reg:"hokkaido",area:"hakodate",lvl:1,name:"Mt. Hakodate view",note:"One of the world's great panoramas — a city pinched into a glittering hourglass at night.",tip:"Ride up before sunset and watch it turn.",flag:""},
{id:"d_goryokaku",cat:"do",reg:"hokkaido",area:"hakodate",lvl:1,name:"Goryokaku star fort",note:"A perfect five-point star moat — Japan's only Western-style citadel of its kind.",tip:"The shape only reads from the tower above it.",flag:""},
{id:"d_hakoasaichi",cat:"do",reg:"hokkaido",area:"hakodate",lvl:1,name:"Hakodate Morning Market",note:"A cavernous dawn market where you jig your own squid from a tank and eat it minutes later.",tip:"Go 6–9am; the ikameshi and uni bowls are the move.",flag:""},
{id:"d_motomachi",cat:"do",reg:"hokkaido",area:"hakodate",lvl:1,name:"Motomachi slopes",note:"Steep harbour-view lanes of Meiji-era churches and consulates from Hakodate's treaty-port days.",tip:"Walk Hachiman-zaka slope down toward the bay at dusk.",flag:"Free"},
{id:"d_kanemori",cat:"do",reg:"hokkaido",area:"hakodate",lvl:1,name:"Kanemori Red Brick Warehouses",note:"Restored 1880s bayside warehouses now full of glassworks, sweets and a music-box hall.",tip:"Pair with the bay boardwalk before the ropeway up the mountain.",flag:""},
{id:"d_onuma",cat:"do",reg:"hokkaido",area:"onuma",lvl:2,name:"Onuma Quasi-Nat'l Park",note:"Island-dotted ponds mirroring the jagged cone of Mt. Komagatake, half an hour north of Hakodate.",tip:"Rent a bike or take the ~15-min pond stroll; easy JR day trip.",flag:""},
{id:"d_otarucanal",cat:"do",reg:"hokkaido",area:"otaru",lvl:1,name:"Otaru Canal",note:"A gas-lit former herring port lined with stone warehouses and glassworks.",tip:"Loveliest at dusk; ~30 min by JR from Sapporo.",flag:""},
{id:"d_nijo",cat:"do",reg:"hokkaido",area:"sapporo",lvl:1,name:"Nijo Market",note:"Sapporo's central seafood market piled with uni bowls and grilled scallops.",tip:"Breakfast donburi here beats any hotel buffet.",flag:""},
{id:"d_beermuseum",cat:"do",reg:"hokkaido",area:"sapporo",lvl:2,name:"Sapporo Beer Museum",note:"Japan's only beer museum, set in the original 1876 red-brick brewery.",tip:"Free entry; pay for the flight of modern vs original brews.",flag:""},
{id:"d_shiroikoibito",cat:"do",reg:"hokkaido",area:"sapporo",lvl:1,name:"Shiroi Koibito Park",note:"A kitschy European-style cookie factory and garden on Sapporo's edge.",tip:"Watch the famous biscuits made through glass.",flag:""},
{id:"d_bluepond",cat:"do",reg:"hokkaido",area:"biei",lvl:1,name:"Blue Pond, Biei",note:"A surreal cobalt pond ringed by pale dead larches — a colour found almost nowhere else.",tip:"Pair with Shirahige Falls and Biei's patchwork hills.",flag:""},
{id:"d_norokko",cat:"do",reg:"hokkaido",area:"furano",lvl:1,name:"Norokko lavender train",note:"A slow open-window sightseeing train trundling through the summer flower fields.",tip:"A temporary 'Lavender-batake' stop drops you at Farm Tomita.",flag:"Summer"},
{id:"d_jigokudani",cat:"do",reg:"hokkaido",area:"noboribetsu",lvl:1,name:"Noboribetsu Hell Valley",note:"A steaming, sulfur-yellow volcanic crater feeding the onsen town below it.",tip:"Walk the boardwalk to the bubbling Oyunuma pond; free.",flag:"Free"},
{id:"d_yotei",cat:"do",reg:"hokkaido",area:"yotei",lvl:2,name:"Mt. Yotei / Niseko",note:"'Ezo-Fuji' — a near-perfect cone rising over green summer meadows.",tip:"Niseko is a quiet hiking and rafting base in summer.",flag:"Summer"},
{id:"d_ryokan",cat:"do",reg:"hokkaido",area:"jozankei",lvl:3,name:"Private en-suite onsen",note:"Your own 24/7 open-air hot-spring bath off a tatami room — the trip's centrepiece.",tip:"Want en-suite roten-buro, not a bookable slot. Book now for the holiday weekend.",flag:"Book"},
/* BUY */
{id:"b_kitkat",cat:"buy",reg:"either",area:"jp",lvl:1,name:"Regional Kit Kats",note:"Flavours that exist nowhere else — Hokkaido melon, wasabi, sake, hojicha.",tip:"Don Quijote has the widest wall; airports do exclusives.",flag:""},
{id:"b_goshuincho",cat:"buy",reg:"either",area:"jp",lvl:1,name:"Goshuincho",note:"A folding book for collecting hand-brushed shrine and temple seals — your real-world coin collection.",tip:"Buy the book at your first shrine, then a goshuin (~¥500) at each.",flag:""},
{id:"b_omamori",cat:"buy",reg:"either",area:"jp",lvl:1,name:"Omamori charm",note:"An embroidered silk amulet for luck, love or safe travel, blessed at the shrine.",tip:"Don't open it — the blessing's sealed inside.",flag:""},
{id:"b_furoshiki",cat:"buy",reg:"either",area:"jp",lvl:1,name:"Furoshiki cloth",note:"A square wrapping cloth that folds into a bag, gift wrap or anything you need.",tip:"Flat, light, endlessly useful — the perfect carry-on souvenir.",flag:""},
{id:"b_tenugui",cat:"buy",reg:"either",area:"jp",lvl:1,name:"Tenugui towel",note:"A printed thin cotton hand-towel that doubles as frameable wall art.",tip:"Designs change monthly; buy a few as flat gifts.",flag:""},
{id:"b_daruma",cat:"buy",reg:"either",area:"jp",lvl:1,name:"Daruma doll",note:"A round red wish-doll with two blank eyes waiting to be filled.",tip:"Paint one eye and set a goal; paint the other when it's done.",flag:""},
{id:"b_sensu",cat:"buy",reg:"either",area:"jp",lvl:1,name:"Sensu folding fan",note:"A pocket folding fan that's a genuine summer-in-Japan essential.",tip:"Cheap ones work all trip; stores do beautiful silk.",flag:"Summer"},
{id:"b_furin",cat:"buy",reg:"either",area:"jp",lvl:1,name:"Furin wind chime",note:"A glass bell hung to 'cool' a Japanese summer with nothing but its sound.",tip:"Hang it at home and it's instantly July in Japan.",flag:"Summer"},
{id:"b_kokeshi",cat:"buy",reg:"either",area:"jp",lvl:2,name:"Kokeshi doll",note:"A limbless painted wooden folk doll from a centuries-old northern craft.",tip:"Good ones turn up in Tokyo craft shops too.",flag:""},
{id:"b_washi",cat:"buy",reg:"either",area:"jp",lvl:1,name:"Washi paper goods",note:"Handmade paper turned into notebooks, tape, fans and lampshades.",tip:"Browse a specialist for sheets you can frame.",flag:""},
{id:"b_matcha",cat:"buy",reg:"either",area:"jp",lvl:2,name:"Ceremonial matcha",note:"Stone-ground green tea powder, vivid and grassy and graded by quality.",tip:"Buy a sealed tin; it stales fast once opened.",flag:""},
{id:"b_yukata",cat:"buy",reg:"either",area:"jp",lvl:2,name:"Yukata",note:"A light cotton summer kimono perfect for festivals and lounging.",tip:"Uniqlo/GU do cheap sets; craft shops do beautiful ones.",flag:"Summer"},
{id:"b_stationery",cat:"buy",reg:"either",area:"jp",lvl:1,name:"Stationery",note:"Cult pens, washi tape and notebooks at a quality that makes paper-lovers weep.",tip:"Itoya (Ginza) and Loft are the meccas.",flag:""},
{id:"b_hanko",cat:"buy",reg:"tokyo",area:"akihabara",lvl:2,name:"Personal hanko seal",note:"A carved name-stamp Japan still uses in place of a handwritten signature.",tip:"Shops carve your name, even in katakana, to order.",flag:""},
{id:"b_sampurukey",cat:"buy",reg:"tokyo",area:"kappabashi",lvl:1,name:"Fake-food keychain",note:"Uncannily real mini sushi, ramen or parfait charms from the sampuru workshops.",tip:"Kappabashi 'Kitchen Town' is the source.",flag:""},
{id:"b_suica",cat:"buy",reg:"tokyo",area:"tokyo",lvl:1,name:"Suica Penguin goods",note:"Merch for the beloved transit-card mascot who's quietly being retired.",tip:"He bows out spring 2027 — grab a piece of history now.",flag:""},
{id:"b_gashapontoy",cat:"buy",reg:"tokyo",area:"akihabara",lvl:1,name:"Gachapon toys",note:"Capsule figurines that get oddly, brilliantly specific — and very collectible.",tip:"Series include miniature izakaya food and awkward cats.",flag:""},
{id:"b_pokemon",cat:"buy",reg:"tokyo",area:"ikebukuro",lvl:1,name:"Pokémon Center",note:"A flagship store stocked with region- and store-exclusive merch.",tip:"The Mega Tokyo branch in Ikebukuro is the big one.",flag:""},
{id:"b_figures",cat:"buy",reg:"tokyo",area:"nakano",lvl:2,name:"Anime figures",note:"Museum-grade new and rare vintage character figures by the floor.",tip:"Mandarake is the legendary used-and-rare hunt.",flag:""},
{id:"b_knives",cat:"buy",reg:"tokyo",area:"kappabashi",lvl:3,name:"Kitchen knives",note:"Hand-forged carbon-steel blades from specialist smiths.",tip:"Kama-Asa will engrave your name and wrap it to fly.",flag:""},
{id:"b_shiroikoibito",cat:"buy",reg:"hokkaido",area:"sapporo",lvl:1,name:"Shiroi Koibito cookies",note:"White chocolate between thin Hokkaido butter biscuits — the definitive northern souvenir.",tip:"Buy at New Chitose Airport on the way out.",flag:"Only Hokkaido"},
{id:"b_marusei",cat:"buy",reg:"hokkaido",area:"sapporo",lvl:1,name:"Marusei butter sand",note:"Rokkatei's raisin-butter-cream cookie — a Hokkaido cult classic.",tip:"Keep cool-ish; eat within a few days.",flag:"Only Hokkaido"},
{id:"b_jagapokkuru",cat:"buy",reg:"hokkaido",area:"sapporo",lvl:1,name:"Jaga Pokkuru",note:"Calbee's crunchy potato sticks made only from Hokkaido spuds.",tip:"Light, travels well; stock up at the airport.",flag:"Only Hokkaido"},
{id:"b_royce",cat:"buy",reg:"hokkaido",area:"sapporo",lvl:1,name:"Royce' choc chips",note:"Potato chips half-dipped in chocolate — absurd, addictive, and born here.",tip:"Buy the chips, not the fresh nama choco, to fly home.",flag:"Only Hokkaido"},
{id:"b_classic",cat:"buy",reg:"hokkaido",area:"susukino",lvl:1,name:"Sapporo Classic beer",note:"A crisp lager brewed for and sold only within Hokkaido.",tip:"Grab cans from any conbini; you can't get it elsewhere.",flag:"Only Hokkaido"},
{id:"b_musicbox",cat:"buy",reg:"hokkaido",area:"otaru",lvl:2,name:"Otaru music box",note:"Intricate wood-and-glass boxes that chime Ghibli and classical tunes.",tip:"Build a custom one — pick the movement and figure.",flag:""},
{id:"b_nikka",cat:"buy",reg:"hokkaido",area:"yoichi",lvl:2,name:"Nikka whisky (Yoichi)",note:"Peaty single malt from the coastal distillery just beyond Otaru.",tip:"Free self-tour and distillery-only bottlings.",flag:""},
{id:"b_ainu",cat:"buy",reg:"hokkaido",area:"shiraoi",lvl:2,name:"Ainu woodcraft",note:"Geometric carvings from Hokkaido's indigenous Ainu tradition.",tip:"Buy at Upopoy to support Ainu artisans directly.",flag:""},

function renderGrid(){

  let items=ITEMS.filter(inScope).map((it,ix)=>({it,ix}))
    .sort((a,b)=>{

/* ---- swipe-down to dismiss the bottom sheet (mobile / iOS) ----
   Native pattern: only start dragging when the sheet is scrolled to the top
   and the finger pulls down, so inner scrolling still works normally.       */
(function(){
  const sheet=$("#sheet");
  let startY=0,dragY=0,active=false,fromTop=false;
  const canSwipe=()=>window.matchMedia("(max-width:559px)").matches;
  sheet.addEventListener("touchstart",e=>{
    if(!modalId||!canSwipe()||e.touches.length!==1)return;
    startY=e.touches[0].clientY;dragY=0;
    fromTop=sheet.scrollTop<=0;active=true;
  },{passive:true});
  sheet.addEventListener("touchmove",e=>{
    if(!active)return;
    const dy=e.touches[0].clientY-startY;
    if(fromTop&&dy>0){
      e.preventDefault();                 // take over from overscroll bounce
      dragY=dy;
      sheet.classList.add("dragging");
      sheet.style.transform=`translateY(${dy}px)`;
    }else{
      dragY=0;fromTop=sheet.scrollTop<=0; // re-arm once they scroll back to top
      sheet.classList.remove("dragging");sheet.style.transform="";
    }
  },{passive:false});
  function end(){
    if(!active)return;active=false;
    sheet.classList.remove("dragging");   // restore the CSS spring transition
    if(dragY>110){
      sheet.style.transform="translateY(110%)";
      const done=()=>{closeModal();sheet.style.transform="";sheet.removeEventListener("transitionend",done);};
      sheet.addEventListener("transitionend",done);
      setTimeout(done,300);               // fallback if transitionend doesn't fire
    }else{
      sheet.style.transform="";           // snap back to translateY(0)
    }
    dragY=0;
  }
  sheet.addEventListener("touchend",end);
  sheet.addEventListener("touchcancel",end);
  /* swipe down on the dimmed area above the sheet also dismisses */
  const ov=$("#ov");let bStartY=null;
  ov.addEventListener("touchstart",e=>{if(e.target===ov)bStartY=e.touches[0].clientY;else bStartY=null;},{passive:true});
  ov.addEventListener("touchend",e=>{
    if(bStartY==null)return;
    if(e.changedTouches[0].clientY-bStartY>30&&modalId)closeModal();
    bStartY=null;
  });
})();

    const list=[];
    snap.forEach(doc=>{const d=doc.data()||{};list.push({id:doc.id,wut:d.wut,usd:d.usd,payers:d.payers||[],settled:!!d.settled,ts:d.ts,by:d.by});});

function isStandalonePWA(){
  return (window.matchMedia&&window.matchMedia("(display-mode: standalone)").matches)
    ||window.navigator.standalone===true;
}

/* --- installed iOS PWA sign-in ---------------------------------------------
   A home-screen PWA can't complete Firebase's popup/redirect flow because that
   hops through the third-party firebaseapp.com domain, which iOS blocks (storage
   partitioning + isolated cookie jar). Instead we redirect the whole page
   straight to Google's OpenID endpoint — a first-party navigation iOS allows —
   ask for an id_token, and hand that token to Firebase directly. No popup, no
   cross-domain frame. Only the installed PWA uses this; browser tabs keep the
   normal popup flow below. */
function pwaSignIn(){
  const cid=window.JC_GIS_CLIENT_ID;
  if(!cid){alert("PWA sign-in isn't configured yet (missing Google client ID).");return;}
  const nonce=Math.random().toString(36).slice(2)+Date.now().toString(36);
  const stateTok=Math.random().toString(36).slice(2);
  try{sessionStorage.setItem("_gState",stateTok);}catch(e){}
  const params=new URLSearchParams({
    client_id:cid,
    redirect_uri:location.origin+location.pathname,   /* e.g. https://haaans.com/japanclan/ */
    response_type:"id_token",
    scope:"openid email profile",
    nonce:nonce,
    state:stateTok,
    prompt:"select_account"
  });
  location.href="https://accounts.google.com/o/oauth2/v2/auth?"+params.toString();
}
/* Called on boot: if we came back from Google with an id_token in the URL
   fragment, exchange it with Firebase. Success flows through onAuthStateChanged. */
function handlePwaAuthReturn(){
  if(!location.hash||location.hash.indexOf("id_token=")<0)return;
  const h=new URLSearchParams(location.hash.slice(1));
  const idToken=h.get("id_token"),retState=h.get("state");
  let wantState=null;try{wantState=sessionStorage.getItem("_gState");sessionStorage.removeItem("_gState");}catch(e){}
  history.replaceState(null,"",location.pathname+location.search);   /* strip token from the URL */
  if(!idToken)return;
  if(wantState&&retState&&retState!==wantState){fbErr({code:"state-mismatch"});return;}
  const cred=firebase.auth.GoogleAuthProvider.credential(idToken);
  fbAuth.signInWithCredential(cred).catch(e=>{fbErr(e);if(e&&e.code)alert("Sign-in failed: "+e.code);});
}

function signIn(){
  if(!fbAuth)return;
  if(isStandalonePWA()){pwaSignIn();return;}   /* installed PWA: first-party Google redirect */
  fbAuth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e=>{
    fbErr(e);
    if(e&&e.code&&e.code!=="auth/popup-closed-by-user")alert("Sign-in failed: "+e.code);
  });
}
function signOut(){if(fbAuth)fbAuth.signOut();}

/* cache / restore signed-in user to avoid auth flash on reload */
function cacheMe(){if(me)localStorage.setItem("_me",JSON.stringify(me));else localStorage.removeItem("_me");}
function restoreMe(){const cached=localStorage.getItem("_me");if(cached)try{me=JSON.parse(cached);}catch(e){}}

/* boot Firebase if the SDK + config are present ------------------------- */
(function bootFirebase(){
  if(!window.firebase||!window.JC_FB_CONFIG||!firebase.initializeApp){console.warn("[sync] Firebase SDK not loaded — running local-only");return;}
  try{
    firebase.initializeApp(window.JC_FB_CONFIG);
    fbAuth=firebase.auth();
    handlePwaAuthReturn();   /* complete installed-PWA sign-in if we just came back from Google */
    const db=firebase.firestore();
    db.enablePersistence({synchronizeTabs:true}).catch(e=>{console.warn("Offline persistence error:",e);});
    const trip=db.collection("trips").doc(TRIP_ID);
    fbLedger=trip.collection("ledger");
    fbPins=trip.collection("pins");
    fbRoster=trip.collection("roster").doc("list");
  }catch(e){console.warn("[sync] init failed",e);return;}
  window.fbReady=true;
  restoreMe();paintAuthBtn();   /* restore cached user to avoid auth flash on reload */

  /* sign in from nav */
  const topBtn = $("#authBtnTop");
  if(topBtn) topBtn.addEventListener("click",()=>{
    if(!me)signIn();
  });

  /* sign out from the main menu */
  $("#amOut").addEventListener("click",()=>{
    if(me)signOut();
    $("#cogMenu").hidden=true;
  });

  fbAuth.onAuthStateChanged(async user=>{
    if(user){
      me={uid:user.uid,name:user.displayName||user.email||"Traveler",email:user.email||"",photo:user.photoURL||null};
      cacheMe();   /* cache to avoid flash on next reload */
      /* join the roster (rules cap it at 13, self-add only) */
      try{await fbRoster.set({members:{[me.uid]:{email:me.email,name:me.name,photo:me.photo||null,ts:Date.now()}}},{merge:true});}
      catch(e){fbErr(e);if(e&&e.code==="permission-denied"){alert("This trip is full (13 people max) or sign-in isn't allowed for this account.");await fbAuth.signOut();return;}}
      /* merge local pins up, then subscribe (snapshot makes cloud authoritative) */
      mergeMyPins();
      subscribePins();
      /* swap the local ledger out for the shared one */
      localExpensesBackup=state.expenses;
      subscribeLedger();
      paintAuthBtn();
    }else{
      me=null;
      cacheMe();   /* clear the cache on sign-out */
      if(ledgerUnsub){ledgerUnsub();ledgerUnsub=null;}
      if(pinsUnsub){pinsUnsub();pinsUnsub=null;}
      othersByItem=Object.create(null);
      if(localExpensesBackup){state.expenses=localExpensesBackup;localExpensesBackup=null;}
      else{state.expenses=Array.isArray(Store.load().expenses)?Store.load().expenses:[];}
      /* my pins fall back to whatever is cached locally (already in state.coins) */
      paintAuthBtn();
      renderBuckets();renderGrid();renderLedger();
    }
  });
})();

/* --- add-to-homescreen hint (mobile only) -------------------------------
   Auto-appears the first time you engage the ledger to add something —
   never on plain page load, never on desktop, never inside the installed
   PWA, and never again after the × is tapped (flag persists).
   Settings → "Offline access" re-opens it any time, ignoring dismissal. */
(function a2hsHint(){
  const el=$("#a2hs");if(!el)return;
  const isIOS=/iP(hone|ad|od)/.test(navigator.userAgent)
    ||(navigator.platform==="MacIntel"&&navigator.maxTouchPoints>1);   /* iPadOS masquerades as Mac */
  const isMobile=()=>!!(window.matchMedia&&matchMedia("(hover:none) and (pointer:coarse)").matches);
  const isDismissed=()=>{try{return localStorage.getItem("_a2hs")==="1";}catch(e){return false;}};
  function reveal(){el.hidden=false;requestAnimationFrame(()=>el.classList.add("show"));}
  function hide(persist){
    if(persist){try{localStorage.setItem("_a2hs","1");}catch(e){}}
    el.classList.remove("show");
    setTimeout(()=>{el.hidden=true;el.classList.remove("expanded");},300);
  }
  /* auto trigger from the ledger: iOS mobile only, and only until the user dismisses it */
  window.a2hsAuto=()=>{if(isIOS&&isMobile()&&!isStandalonePWA()&&!isDismissed())reveal();};
  /* manual trigger from Settings: mobile only, always shows the instructions, ignores dismissal */
  window.a2hsOpen=()=>{if(isMobile()&&!isStandalonePWA())reveal();};

  $("#a2hsX").addEventListener("click",()=>hide(true));
  $("#a2hsWut").addEventListener("click",()=>el.classList.add("expanded"));
  $("#a2hsHide").addEventListener("click",()=>el.classList.remove("expanded"));
  const cogA2hs=$("#cogA2hs");
  if(cogA2hs)cogA2hs.addEventListener("click",()=>{cogMenu.hidden=true;window.a2hsOpen();});
})();

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(e=>console.warn('SW reg failed:',e));
</script>
