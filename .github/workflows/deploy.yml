name: Deploy static site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# actions/deploy-pages@v5 strictly requires these OIDC token permissions
permissions:
  contents: read
  pages: write
  id-token: write

# one deployment at a time; let an in-progress run finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site (static files only)
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' --exclude='.github' --exclude='_site' \
            --exclude='node_modules' \
            --exclude='firebase.json' --exclude='.firebaserc' --exclude='.agents' \
            --exclude='.claude' --exclude='config' \
            --exclude='worker' \
            --exclude='README.md' --exclude='*.md' \
            ./ _site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
